<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 48" height="48" width="180" role="img" aria-label="Moglix Enterprise">
  <!-- moglix wordmark -->
  <text x="0" y="28" font-family="Poppins,Arial Black,sans-serif" font-weight="800" font-size="26" fill="#D9232D" letter-spacing="-0.5">moglix</text>
  <!-- 6-dot grid (2 rows × 3 cols) positioned top-right of wordmark -->
  <circle cx="152" cy="6"  r="3.5" fill="#D9232D"/>
  <circle cx="162" cy="6"  r="3.5" fill="#D9232D"/>
  <circle cx="172" cy="6"  r="3.5" fill="#D9232D"/>
  <circle cx="152" cy="16" r="3.5" fill="#D9232D"/>
  <circle cx="162" cy="16" r="3.5" fill="#D9232D"/>
  <circle cx="172" cy="16" r="3.5" fill="#D9232D" opacity="0.4"/>
  <!-- Enterprise label -->
  <text x="1" y="42" font-family="Poppins,Arial,sans-serif" font-weight="500" font-size="11" fill="#666666" letter-spacing="1.2">Enterprise</text>
</svg>
